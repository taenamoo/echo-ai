version: '3.8'
# Docker Compose configuration for Echo AI application with DynamoDB Local
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echo-ai-app
    ports:
      - '3001:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - /app/.pnpm-store
    environment:
      - NODE_ENV=development
      # HOT RELOAD
      - WATCHPACK_POLLING=true
      - NODE_EXTRA_CA_CERTS=/usr/local/share/ca-certificates/corporate-ca.crt
      #- DYNAMODB_ENDPOINT=http://dynamodb-local:8998
    depends_on:
      - dynamodb-local
    networks:
      - echo-ai-net

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: echo-ai-dynamodb
    ports:
      - '8998:8998'
    volumes:
      - ./docker/dynamodb_data:/home/dynamodblocal/data
    working_dir: /home/dynamodblocal
    command: "-jar DynamoDBLocal.jar -port 8998 -sharedDb"
    networks:
      - echo-ai-net

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: dynamodb-admin
    ports:
      - '8999:8001'
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8998
    depends_on:
      - dynamodb-local
    networks:
      - echo-ai-net

networks:
  echo-ai-net:
    driver: bridge