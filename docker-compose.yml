version: '3.8'
# Docker Compose configuration for Echo AI application with DynamoDB Local
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echo-ai-app
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - /app/.pnpm-store
    environment:
      - NODE_ENV=development
      # HOT RELOAD
      - WATCHPACK_POLLING=true
      - NODE_EXTRA_CA_CERTS=/usr/local/share/ca-certificates/corporate-ca.crt
      - S3_ENDPOINT=http://localstack:4566
      - SQS_ENDPOINT=http://localstack:4566
      - SUMMARIZE_ASYNC=true
      - SUMMARIZE_SQS_QUEUE_URL=http://localstack:4566/000000000000/echoai-summarize-queue
      #- DYNAMODB_ENDPOINT=http://dynamodb-local:8998
    dns:
      - 8.8.8.8
    depends_on:
      - dynamodb-local
      - localstack
      - dynamodb-init
    networks:
      - echo-ai-net

  ai-processor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echo-ai-processor
    depends_on:
      - localstack
      - dynamodb-local
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NODE_EXTRA_CA_CERTS=/usr/local/share/ca-certificates/corporate-ca.crt
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-test-bucket}
      - JWT_SECRET=${JWT_SECRET:-TEST}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-YOUR_GEMINI_API_KEY}
      - SQS_ENDPOINT=http://localstack:4566
      - S3_ENDPOINT=http://localstack:4566
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8998
      - SUMMARIZE_ASYNC=true
      - SUMMARIZE_SQS_QUEUE_URL=http://localstack:4566/000000000000/echoai-summarize-queue
    command: ["pnpm", "--filter", "@echo-ai/service-ai-processor", "run", "local"]
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.pnpm-store
    networks:
      - echo-ai-net

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: echo-ai-dynamodb
    ports:
      - '8998:8998'
    volumes:
      - ./docker/dynamodb_data:/home/dynamodblocal/data
    working_dir: /home/dynamodblocal
    command: '-jar DynamoDBLocal.jar -port 8998 -sharedDb'
    networks:
      - echo-ai-net

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: dynamodb-admin
    ports:
      - '8999:8001'
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8998
    depends_on:
      - dynamodb-local
    networks:
      - echo-ai-net

  localstack:
    image: localstack/localstack:latest
    container_name: echo-ai-localstack
    ports:
      - '4566:4566'
      - '4571:4571'
    environment:
      - SERVICES=s3,sqs
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-test-bucket}
    volumes:
      - './setting/bash/localstack-init-s3.sh:/etc/localstack/init/ready.d/10-init-s3.sh:ro'
      - './setting/bash/localstack-init-sqs.sh:/etc/localstack/init/ready.d/20-init-sqs.sh:ro'
    networks:
      - echo-ai-net

  dynamodb-init:
    image: amazon/aws-cli:latest
    container_name: echo-ai-dynamodb-init
    depends_on:
      - dynamodb-local
    environment:
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-dummy}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-dummy}
      DYNAMODB_ENDPOINT: http://dynamodb-local:8998
    volumes:
      - ./setting/bash/dynamodb-init.sh:/usr/local/bin/dynamodb-init.sh:ro
    entrypoint: ['sh', '/usr/local/bin/dynamodb-init.sh']
    networks:
      - echo-ai-net
    restart: 'no'

networks:
  echo-ai-net:
    driver: bridge
