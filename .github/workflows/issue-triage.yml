name: 'Gemini AI Issue Triage'

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      id-token: write
      contents: read
    steps:
      - uses: 'google-github-actions/run-gemini-cli@main'
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            당신은 이 프로젝트의 관리자입니다. 새로 등록된 이 이슈를 분석해주세요.
            이슈의 내용을 바탕으로 다음 레이블 중 가장 적절한 것을 하나만 선택하여 적용해주세요: 'bug', 'feature-request', 'documentation', 'question'.
            또한, 이슈의 시급성을 고려하여 'priority: high', 'priority: medium', 'priority: low' 중 하나의 우선순위 레이블을 적용해주세요.
            GitHub CLI 도구('gh')를 사용하여 레이블을 적용해야 합니다.