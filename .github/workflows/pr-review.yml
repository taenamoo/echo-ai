name: 'Gemini AI PR Reviewer'

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      id-token: write
      contents: read
    steps:
      - uses: 'google-github-actions/run-gemini-cli@v1'
        with:
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gcp_service_account: '${{ vars.GCP_SERVICE_ACCOUNT }}'
          prompt: |
            당신은 선임 소프트웨어 엔지니어 역할을 하는 코드 리뷰어입니다.
            이 풀 리퀘스트의 변경 사항을 다음 관점에서 검토해주세요:
            1.  **가독성 및 명확성:** 코드가 이해하기 쉬운가? 변수명과 함수명이 명확한가?
            2.  **잠재적 버그:** 엣지 케이스나 null 포인터 예외와 같은 잠재적 오류가 있는가?
            3.  **성능:** 비효율적인 루프나 불필요한 데이터베이스 쿼리가 있는가?
            4.  **코딩 표준:** 우리 팀의 코딩 표준(GEMINI.md에 정의됨)을 준수하는가?
            리뷰 결과를 마크다운 형식으로 정리하여 댓글로 남겨주세요.